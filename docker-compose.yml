# Full self-host stack: `docker compose up -d`
#   web     → http://localhost:8080   (the bujo app)
#   adminer → http://localhost:8081   (browse the Postgres database)
#   db      → localhost:5432          (Postgres, schema auto-loaded on first boot)
services:
  web:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    image: bujo:latest
    container_name: bujo-web
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: bujo-db
    environment:
      POSTGRES_DB: bujo
      POSTGRES_USER: bujo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bujo}
    volumes:
      - bujo-db:/var/lib/postgresql/data
      - ./docker/initdb.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      # BUJO-193: JWT roles + RLS, applied right after the schema (name order).
      - ./docker/02-security.sql:/docker-entrypoint-initdb.d/02-security.sql:ro
    # NOTE: in production, do NOT publish 5432 to the host. The DB is reachable
    # over the compose network by `api`/`adminer`; binding to 127.0.0.1 keeps it
    # off the public interface. Remove this block entirely if nothing on the host
    # needs psql access.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bujo -d bujo"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # REST API over Postgres (the sync endpoint the app saves to).
  # BUJO-193: PostgREST now REQUIRES a valid JWT for any write. The anon role
  # (web_anon) has zero table grants, and RLS scopes each row to the token `sub`.
  # PGRST_JWT_SECRET MUST be set (32+ chars / HS256). See
  # docs/security/postgrest-hardening.md.
  api:
    image: postgrest/postgrest:v12.2.3
    container_name: bujo-api
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD:-bujo}@db:5432/bujo
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: web_anon
      # REQUIRED: 32+ char HS256 secret. With no secret PostgREST falls back to
      # the anon role for every request — and anon can now do nothing — so an
      # empty secret fails closed (locked, not open). Generate: see the docs.
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET:?set a 32+ char PGRST_JWT_SECRET (see docs/security/postgrest-hardening.md)}
      # Token must claim {"role":"bujo_user"} to get write access.
      PGRST_DB_PRE_REQUEST: ""
      # Don't echo internal errors / row counts to clients.
      PGRST_DB_AGGREGATES_ENABLED: "false"
      PGRST_SERVER_CORS_ALLOWED_ORIGINS: ${PGRST_CORS_ORIGINS:-*}
    # Not published to the host: clients reach the API through the TLS proxy
    # (api-proxy) on :8443. Expose 3000 directly only for local debugging.
    expose:
      - "3000"
    depends_on:
      - db
    restart: unless-stopped

  # BUJO-193: TLS-terminating reverse proxy in front of PostgREST. PostgREST
  # speaks plain HTTP; this nginx adds HTTPS (self-signed for local, real cert
  # for prod) and forces HTTP→HTTPS. Clients hit https://localhost:8443.
  api-proxy:
    image: nginx:alpine
    container_name: bujo-api-proxy
    volumes:
      - ./docker/api-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount your certs here. For local dev, generate a self-signed pair into
      # ./docker/certs (see docs/security/postgrest-hardening.md → TLS).
      - ./docker/certs:/etc/nginx/certs:ro
    ports:
      - "8443:443"
      - "8480:80"   # redirects to https; drop in prod if you front with a LB
    depends_on:
      - api
    restart: unless-stopped

  # DB browser — convenience only. DO NOT expose adminer in production; it is an
  # unauthenticated path to the database. Bound to localhost here; remove the
  # service (or the ports block) entirely on a public host.
  adminer:
    image: adminer:4
    container_name: bujo-adminer
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  bujo-db:
