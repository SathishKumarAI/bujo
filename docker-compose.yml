# Full self-host stack: `docker compose up -d`
#   web     → http://localhost:8080   (the bujo app)
#   adminer → http://localhost:8081   (browse the Postgres database)
#   db      → localhost:5432          (Postgres, schema auto-loaded on first boot)
services:
  web:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    image: bujo:latest
    container_name: bujo-web
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: bujo-db
    environment:
      POSTGRES_DB: bujo
      POSTGRES_USER: bujo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bujo}
    volumes:
      - bujo-db:/var/lib/postgresql/data
      - ./docker/initdb.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bujo -d bujo"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  adminer:
    image: adminer:4
    container_name: bujo-adminer
    ports:
      - "8081:8080"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  bujo-db:
