# BUJO-193 — TLS termination + HTTPS enforcement in front of PostgREST.
# PostgREST (service `api`) speaks plain HTTP on :3000 over the compose network;
# this proxy is the only thing clients should talk to. See
# docs/security/postgrest-hardening.md for cert generation (self-signed local /
# real cert prod).

# Plain HTTP → force redirect to HTTPS.
server {
  listen 80;
  server_name _;
  return 301 https://$host:8443$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name _;

  # Mounted from ./docker/certs (see compose). For prod, replace with your real
  # fullchain.pem / privkey.pem (e.g. certbot / your LB's cert).
  ssl_certificate     /etc/nginx/certs/api.crt;
  ssl_certificate_key /etc/nginx/certs/api.key;

  # Modern TLS only.
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;

  # Don't leak the upstream server banner.
  proxy_hide_header Server;
  server_tokens off;

  # Cap request body — a whole-journal blob is small; refuse anything huge.
  client_max_body_size 5m;

  location / {
    proxy_pass http://api:3000;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Critical: the Authorization: Bearer <jwt> header must reach PostgREST.
    proxy_set_header Authorization     $http_authorization;
  }
}
