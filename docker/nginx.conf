server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hashed assets: cache forever.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
  # Never cache the shell or the service worker, so updates land.
  location = /index.html { add_header Cache-Control "no-cache"; }
  location = /sw.js      { add_header Cache-Control "no-cache"; }

  # Security headers — mirror vercel.json (CSP is enforced in prod).
  add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https:; script-src 'self'; base-uri 'self'; frame-ancestors 'none'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # SPA fallback — every unknown route serves index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
