server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers (CSP, HSTS, COOP/CORP, etc.) live in security-headers.conf.
  # nginx add_header does NOT inherit into a location that has its own add_header,
  # so the snippet is included in the server block AND in every cache location.
  include /etc/nginx/security-headers.conf;

  # Hashed assets: cache forever.
  location /assets/ {
    include /etc/nginx/security-headers.conf;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
  # Never cache the shell or the service worker, so updates land.
  location = /index.html {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache";
  }
  location = /sw.js {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache";
  }

  # SPA fallback — every unknown route serves index.html (inherits server headers).
  location / {
    try_files $uri $uri/ /index.html;
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
